name = "euronews-pt-reading-lab"
main = "src/index.ts"
compatibility_date = "2026-06-13"

[[d1_databases]]
binding = "DB"
database_name = "euronews_pt_reading_lab"
database_id = "local-euronews-pt-reading-lab"
migrations_dir = "migrations"

[ai]
binding = "AI"

# Pin the dev port so the Vite proxy (which targets 8787) always matches.
# If 8787 is taken wrangler now fails loudly instead of drifting to a
# random port; kill the stale process (`lsof -ti:8787 | xargs kill`).
[dev]
port = 8787

[triggers]
crons = ["0 6 * * *"]
